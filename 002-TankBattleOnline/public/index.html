<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>坦克大战 - FC复刻版 (支持在线组队)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    h1 {
      color: #ff6b6b;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .game-wrapper {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    #gameCanvas {
      background-color: #000;
      border: 4px solid #4a4a6a;
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .panel {
      background-color: #2a2a4e;
      border: 2px solid #4a4a6a;
      border-radius: 10px;
      padding: 20px;
      width: 300px;
    }

    .panel h2 {
      color: #ff6b6b;
      margin-bottom: 15px;
      font-size: 1.3em;
      border-bottom: 2px solid #4a4a6a;
      padding-bottom: 10px;
    }

    .menu-screen {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      background-color: #ff6b6b;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .btn:hover {
      background-color: #ff5252;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
    }

    .btn:disabled {
      background-color: #666;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background-color: #4a4a6a;
    }

    .btn-secondary:hover {
      background-color: #5a5a7a;
    }

    .room-list {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 15px;
    }

    .room-item {
      background-color: #3a3a5e;
      border: 1px solid #4a4a6a;
      border-radius: 5px;
      padding: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .room-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .room-name {
      font-weight: bold;
      color: #ff6b6b;
    }

    .room-players {
      font-size: 0.9em;
      color: #aaa;
    }

    .player-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }

    .player-item {
      background-color: #3a3a5e;
      border: 1px solid #4a4a6a;
      border-radius: 5px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-name {
      font-weight: bold;
    }

    .player-ready {
      color: #4caf50;
      font-weight: bold;
    }

    .player-not-ready {
      color: #ff9800;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .status-item {
      background-color: #3a3a5e;
      padding: 8px 15px;
      border-radius: 5px;
      text-align: center;
      flex: 1;
      min-width: 80px;
    }

    .status-label {
      font-size: 0.8em;
      color: #aaa;
      margin-bottom: 5px;
    }

    .status-value {
      font-size: 1.2em;
      font-weight: bold;
      color: #ff6b6b;
    }

    .controls-info {
      background-color: #3a3a5e;
      border-radius: 5px;
      padding: 15px;
      margin-top: 15px;
    }

    .controls-info h3 {
      color: #ff6b6b;
      margin-bottom: 10px;
      font-size: 1em;
    }

    .controls-info ul {
      list-style: none;
      font-size: 0.9em;
      color: #ccc;
    }

    .controls-info li {
      margin-bottom: 5px;
    }

    .key {
      background-color: #4a4a6a;
      padding: 2px 8px;
      border-radius: 3px;
      font-family: monospace;
      margin-right: 5px;
    }

    .game-over-screen {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .game-over-text {
      font-size: 3em;
      font-weight: bold;
      color: #ff6b6b;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      margin-bottom: 20px;
    }

    .victory-text {
      color: #4caf50;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 15px;
    }

    .input-group label {
      font-size: 0.9em;
      color: #ccc;
    }

    .input-group input {
      padding: 10px;
      border: 1px solid #4a4a6a;
      border-radius: 5px;
      background-color: #3a3a5e;
      color: #e0e0e0;
      font-family: inherit;
    }

    .input-group input:focus {
      outline: none;
      border-color: #ff6b6b;
    }

    .hidden {
      display: none !important;
    }

    .connection-status {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 5px 15px;
      border-radius: 5px;
      font-size: 0.9em;
    }

    .connected {
      background-color: #4caf50;
      color: white;
    }

    .disconnected {
      background-color: #f44336;
      color: white;
    }

    .waiting-text {
      text-align: center;
      color: #aaa;
      margin: 20px 0;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 坦克大战 - FC复刻版</h1>
    
    <div class="connection-status disconnected" id="connectionStatus">
      未连接
    </div>

    <div class="game-wrapper">
      <div id="menuScreen" class="panel">
        <h2>游戏菜单</h2>
        <div class="menu-screen">
          <div class="input-group">
            <label for="playerName">玩家昵称:</label>
            <input type="text" id="playerName" placeholder="输入你的昵称" maxlength="10" value="玩家">
          </div>
          
          <button class="btn" id="createRoomBtn">创建房间</button>
          <button class="btn btn-secondary" id="refreshRoomsBtn">刷新房间列表</button>
          
          <h2 style="margin-top: 20px;">可用房间</h2>
          <div class="room-list" id="roomList">
            <div class="waiting-text">正在加载房间列表...</div>
          </div>
          
          <div class="controls-info">
            <h3>游戏操作:</h3>
            <ul>
              <li><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 或 <span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> - 移动坦克</li>
              <li><span class="key">空格</span> 或 <span class="key">J</span> - 发射子弹</li>
              <li><span class="key">R</span> - 复活 (有生命时)</li>
            </ul>
          </div>
        </div>
      </div>

      <div id="roomScreen" class="panel hidden">
        <h2>房间: <span id="roomNameDisplay"></span></h2>
        
        <div class="player-list" id="playerList">
        </div>
        
        <div class="status-bar">
          <div class="status-item">
            <div class="status-label">房间ID</div>
            <div class="status-value" id="roomIdDisplay">-</div>
          </div>
        </div>
        
        <button class="btn" id="readyBtn">准备</button>
        <button class="btn" id="startGameBtn" style="display: none;">开始游戏</button>
        <button class="btn btn-secondary" id="leaveRoomBtn">离开房间</button>
        
        <div class="waiting-text" id="waitingText">
          等待其他玩家加入...
        </div>
      </div>

      <canvas id="gameCanvas" width="208" height="416" class="hidden"></canvas>
      
      <div id="gamePanel" class="panel hidden">
        <h2>游戏状态</h2>
        
        <div class="status-bar">
          <div class="status-item">
            <div class="status-label">得分</div>
            <div class="status-value" id="scoreDisplay">0</div>
          </div>
          <div class="status-item">
            <div class="status-label">生命</div>
            <div class="status-value" id="livesDisplay">3</div>
          </div>
          <div class="status-item">
            <div class="status-label">敌人</div>
            <div class="status-value" id="enemiesDisplay">0/20</div>
          </div>
        </div>
        
        <div class="player-list" id="gamePlayersList">
        </div>
        
        <button class="btn btn-secondary" id="backToMenuBtn">返回菜单</button>
        
        <div class="controls-info">
          <h3>游戏操作:</h3>
          <ul>
            <li><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 或 方向键 - 移动</li>
            <li><span class="key">空格</span> 或 <span class="key">J</span> - 发射子弹</li>
            <li><span class="key">R</span> - 复活</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GameState = {
      MENU: 'menu',
      ROOM: 'room',
      PLAYING: 'playing',
      GAME_OVER: 'gameover'
    };

    const TankBattle = {
      ws: null,
      state: GameState.MENU,
      roomId: null,
      playerId: null,
      playerName: '玩家',
      isHost: false,
      isReady: false,
      gameState: null,
      keys: {},
      canvas: null,
      ctx: null,
      
      init() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.setupEventListeners();
        this.connect();
      },

      setupEventListeners() {
        document.getElementById('createRoomBtn').addEventListener('click', () => this.createRoom());
        document.getElementById('refreshRoomsBtn').addEventListener('click', () => this.refreshRooms());
        document.getElementById('readyBtn').addEventListener('click', () => this.toggleReady());
        document.getElementById('startGameBtn').addEventListener('click', () => this.startGame());
        document.getElementById('leaveRoomBtn').addEventListener('click', () => this.leaveRoom());
        document.getElementById('backToMenuBtn').addEventListener('click', () => this.backToMenu());

        document.addEventListener('keydown', (e) => {
          this.keys[e.code] = true;
          if (this.state === GameState.PLAYING) {
            this.handleKeyDown(e);
          }
        });

        document.addEventListener('keyup', (e) => {
          this.keys[e.code] = false;
          if (this.state === GameState.PLAYING) {
            this.handleKeyUp(e);
          }
        });
      },

      connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        
        try {
          this.ws = new WebSocket(wsUrl);
          
          this.ws.onopen = () => {
            console.log('WebSocket连接成功');
            document.getElementById('connectionStatus').textContent = '已连接';
            document.getElementById('connectionStatus').className = 'connection-status connected';
            this.refreshRooms();
          };

          this.ws.onmessage = (event) => {
            try {
              const message = JSON.parse(event.data);
              this.handleMessage(message);
            } catch (error) {
              console.error('消息解析错误:', error);
            }
          };

          this.ws.onclose = () => {
            console.log('WebSocket连接关闭');
            document.getElementById('connectionStatus').textContent = '已断开';
            document.getElementById('connectionStatus').className = 'connection-status disconnected';
            
            setTimeout(() => {
              if (this.ws.readyState === WebSocket.CLOSED) {
                this.connect();
              }
            }, 3000);
          };

          this.ws.onerror = (error) => {
            console.error('WebSocket错误:', error);
          };
        } catch (error) {
          console.error('连接失败:', error);
        }
      },

      send(message) {
        if (this.ws && this.ws.readyState === WebSocket.OPEN) {
          this.ws.send(JSON.stringify(message));
        }
      },

      handleMessage(message) {
        switch (message.type) {
          case 'roomList':
            this.updateRoomList(message.rooms);
            break;
          case 'created':
            this.onRoomCreated(message);
            break;
          case 'joined':
            this.onRoomJoined(message);
            break;
          case 'roomState':
            this.updateRoomState(message.room);
            break;
          case 'gameStarted':
            this.onGameStarted(message.gameState);
            break;
          case 'gameState':
            this.onGameStateUpdate(message.gameState);
            break;
          case 'error':
            alert(message.message);
            break;
          default:
            break;
        }
      },

      createRoom() {
        const name = document.getElementById('playerName').value.trim() || '玩家';
        this.playerName = name;
        this.send({ type: 'create', name: name + '的房间' });
      },

      refreshRooms() {
        this.send({ type: 'list' });
      },

      joinRoom(roomId) {
        const name = document.getElementById('playerName').value.trim() || '玩家';
        this.playerName = name;
        this.send({ type: 'join', roomId, name });
      },

      leaveRoom() {
        this.send({ type: 'leave' });
        this.showMenuScreen();
        this.refreshRooms();
      },

      toggleReady() {
        this.isReady = !this.isReady;
        this.send({ type: 'ready', ready: this.isReady });
      },

      startGame() {
        this.send({ type: 'start' });
      },

      backToMenu() {
        this.send({ type: 'leave' });
        this.showMenuScreen();
        this.refreshRooms();
      },

      updateRoomList(rooms) {
        const roomList = document.getElementById('roomList');
        
        if (rooms.length === 0) {
          roomList.innerHTML = '<div class="waiting-text">暂无可用房间，快来创建一个吧！</div>';
          return;
        }

        let html = '';
        rooms.forEach(room => {
          html += `
            <div class="room-item">
              <div class="room-info">
                <div class="room-name">${this.escapeHtml(room.name)}</div>
                <div class="room-players">玩家: ${room.playerCount}/${room.maxPlayers}</div>
              </div>
              <button class="btn btn-secondary" onclick="TankBattle.joinRoom('${room.id}')">
                加入
              </button>
            </div>
          `;
        });
        roomList.innerHTML = html;
      },

      onRoomCreated(message) {
        this.roomId = message.roomId;
        this.playerId = message.playerId;
        this.isHost = true;
        this.showRoomScreen();
      },

      onRoomJoined(message) {
        this.roomId = message.roomId;
        this.playerId = message.playerId;
        this.isHost = false;
        this.showRoomScreen();
      },

      updateRoomState(room) {
        document.getElementById('roomNameDisplay').textContent = room.name;
        document.getElementById('roomIdDisplay').textContent = room.id;

        const playerList = document.getElementById('playerList');
        let html = '';
        
        room.players.forEach(player => {
          const isMe = player.id === this.playerId;
          const isHost = player.id === room.hostId;
          const readyClass = player.ready ? 'player-ready' : 'player-not-ready';
          const readyText = player.ready ? '已准备' : '未准备';
          
          html += `
            <div class="player-item">
              <div class="player-name">
                ${this.escapeHtml(player.name)}
                ${isMe ? ' (我)' : ''}
                ${isHost ? ' 👑' : ''}
              </div>
              <div class="${readyClass}">${readyText}</div>
            </div>
          `;
        });
        playerList.innerHTML = html;

        const startBtn = document.getElementById('startGameBtn');
        if (this.isHost) {
          startBtn.style.display = 'block';
        } else {
          startBtn.style.display = 'none';
        }

        const readyBtn = document.getElementById('readyBtn');
        readyBtn.textContent = this.isReady ? '取消准备' : '准备';
        readyBtn.className = this.isReady ? 'btn btn-secondary' : 'btn';

        const waitingText = document.getElementById('waitingText');
        if (room.players.length < 2) {
          waitingText.textContent = '等待其他玩家加入...';
          waitingText.style.display = 'block';
        } else {
          waitingText.style.display = 'none';
        }
      },

      onGameStarted(gameState) {
        this.gameState = gameState;
        this.state = GameState.PLAYING;
        this.showGameScreen();
        this.gameLoop();
      },

      onGameStateUpdate(gameState) {
        this.gameState = gameState;
        
        if (gameState.gameOver) {
          this.state = GameState.GAME_OVER;
        }
        
        this.updateGameUI();
      },

      handleKeyDown(e) {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'KeyW', 'KeyA', 'KeyS', 'KeyD', 'Space', 'KeyJ', 'KeyR'].includes(e.code)) {
          e.preventDefault();
        }

        if (e.code === 'ArrowUp' || e.code === 'KeyW') {
          this.send({ type: 'move', direction: 0 });
        } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
          this.send({ type: 'move', direction: 1 });
        } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
          this.send({ type: 'move', direction: 2 });
        } else if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
          this.send({ type: 'move', direction: 3 });
        } else if (e.code === 'Space' || e.code === 'KeyJ') {
          this.send({ type: 'shoot' });
        } else if (e.code === 'KeyR') {
          this.send({ type: 'respawn' });
        }
      },

      handleKeyUp(e) {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'KeyW', 'KeyA', 'KeyS', 'KeyD'].includes(e.code)) {
          this.send({ type: 'stop' });
        }
      },

      gameLoop() {
        if (this.state !== GameState.PLAYING && this.state !== GameState.GAME_OVER) return;

        this.render();
        
        if (this.state === GameState.GAME_OVER) {
          this.renderGameOver();
        } else {
          requestAnimationFrame(() => this.gameLoop());
        }
      },

      render() {
        if (!this.gameState) return;

        const ctx = this.ctx;
        const TILE_SIZE = 16;
        
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        const map = this.gameState.map;
        for (let y = 0; y < 26; y++) {
          for (let x = 0; x < 13; x++) {
            const tile = map[y][x];
            const px = x * TILE_SIZE;
            const py = y * TILE_SIZE;
            
            if (tile === 1) {
              this.drawBrick(ctx, px, py, TILE_SIZE);
            } else if (tile === 2) {
              this.drawSteel(ctx, px, py, TILE_SIZE);
            }
          }
        }

        this.drawBase(ctx);

        this.gameState.enemies.forEach(enemy => {
          if (enemy.health > 0) {
            this.drawTank(ctx, enemy.x, enemy.y, enemy.direction, 'enemy', enemy.type);
          }
        });

        this.gameState.players.forEach(player => {
          if (player.health > 0) {
            this.drawTank(ctx, player.x, player.y, player.direction, 'player');
          }
        });

        this.gameState.bullets.forEach(bullet => {
          this.drawBullet(ctx, bullet.x, bullet.y, bullet.isEnemy);
        });

        this.gameState.explosions.forEach(exp => {
          this.drawExplosion(ctx, exp.x, exp.y, exp.timer, exp.maxTimer);
        });
      },

      drawBrick(ctx, x, y, size) {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(x, y, size, size);
        
        ctx.fillStyle = '#A0522D';
        ctx.fillRect(x, y, size / 2, size / 2);
        ctx.fillRect(x + size / 2, y + size / 2, size / 2, size / 2);
        
        ctx.strokeStyle = '#654321';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, size, size);
      },

      drawSteel(ctx, x, y, size) {
        ctx.fillStyle = '#808080';
        ctx.fillRect(x, y, size, size);
        
        ctx.fillStyle = '#C0C0C0';
        ctx.fillRect(x + 2, y + 2, size / 2 - 2, size / 2 - 2);
        ctx.fillRect(x + size / 2 + 2, y + size / 2 + 2, size / 2 - 2, size / 2 - 2);
        
        ctx.strokeStyle = '#404040';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, size, size);
      },

      drawBase(ctx) {
        const base = this.gameState.base;
        const x = base.x;
        const y = base.y;
        
        if (base.destroyed) {
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(x, y, 32, 32);
          ctx.fillStyle = '#654321';
          ctx.fillRect(x + 4, y + 4, 8, 8);
          ctx.fillRect(x + 20, y + 8, 6, 6);
          ctx.fillRect(x + 8, y + 20, 10, 8);
        } else {
          ctx.fillStyle = '#FFD700';
          ctx.fillRect(x, y, 32, 32);
          
          ctx.fillStyle = '#FFA500';
          ctx.beginPath();
          ctx.moveTo(x + 16, y + 4);
          ctx.lineTo(x + 28, y + 28);
          ctx.lineTo(x + 4, y + 28);
          ctx.closePath();
          ctx.fill();
          
          ctx.fillStyle = '#FF4500';
          ctx.beginPath();
          ctx.moveTo(x + 16, y + 10);
          ctx.lineTo(x + 24, y + 26);
          ctx.lineTo(x + 8, y + 26);
          ctx.closePath();
          ctx.fill();
          
          ctx.strokeStyle = '#8B4513';
          ctx.lineWidth = 2;
          ctx.strokeRect(x, y, 32, 32);
        }
      },

      drawTank(ctx, x, y, direction, type, enemyType = 'normal') {
        const tankSize = 16;
        
        ctx.save();
        ctx.translate(x + tankSize / 2, y + tankSize / 2);
        ctx.rotate(direction * Math.PI / 2);
        ctx.translate(-tankSize / 2, -tankSize / 2);

        let bodyColor, turretColor, trackColor;
        
        if (type === 'player') {
          bodyColor = '#4CAF50';
          turretColor = '#66BB6A';
          trackColor = '#2E7D32';
        } else {
          if (enemyType === 'fast') {
            bodyColor = '#FF9800';
            turretColor = '#FFB74D';
            trackColor = '#E65100';
          } else if (enemyType === 'armor') {
            bodyColor = '#9E9E9E';
            turretColor = '#BDBDBD';
            trackColor = '#616161';
          } else {
            bodyColor = '#F44336';
            turretColor = '#EF5350';
            trackColor = '#B71C1C';
          }
        }

        ctx.fillStyle = trackColor;
        ctx.fillRect(0, 0, 4, tankSize);
        ctx.fillRect(tankSize - 4, 0, 4, tankSize);

        ctx.fillStyle = bodyColor;
        ctx.fillRect(4, 2, tankSize - 8, tankSize - 4);

        ctx.fillStyle = turretColor;
        ctx.beginPath();
        ctx.arc(tankSize / 2, tankSize / 2, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = bodyColor;
        ctx.fillRect(tankSize / 2 - 2, 0, 4, tankSize / 2 - 2);

        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.strokeRect(4, 2, tankSize - 8, tankSize - 4);
        ctx.beginPath();
        ctx.arc(tankSize / 2, tankSize / 2, 5, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      },

      drawBullet(ctx, x, y, isEnemy) {
        ctx.fillStyle = isEnemy ? '#FFD700' : '#FFF';
        ctx.fillRect(x, y, 4, 4);
        
        ctx.strokeStyle = isEnemy ? '#FFA500' : '#CCC';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, 4, 4);
      },

      drawExplosion(ctx, x, y, timer, maxTimer) {
        const progress = timer / maxTimer;
        const size = 16 + progress * 16;
        const alpha = 1 - progress;
        
        ctx.save();
        ctx.globalAlpha = alpha;
        
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
        gradient.addColorStop(0, '#FFF');
        gradient.addColorStop(0.3, '#FFD700');
        gradient.addColorStop(0.6, '#FF4500');
        gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      },

      renderGameOver() {
        const ctx = this.ctx;
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        if (this.gameState.victory) {
          ctx.fillStyle = '#4CAF50';
          ctx.font = 'bold 24px Arial';
          ctx.fillText('胜利！', this.canvas.width / 2, this.canvas.height / 2 - 20);
        } else {
          ctx.fillStyle = '#F44336';
          ctx.font = 'bold 24px Arial';
          ctx.fillText('游戏结束', this.canvas.width / 2, this.canvas.height / 2 - 20);
        }

        ctx.fillStyle = '#FFF';
        ctx.font = '14px Arial';
        ctx.fillText('按"返回菜单"继续', this.canvas.width / 2, this.canvas.height / 2 + 20);
      },

      updateGameUI() {
        const myPlayer = this.gameState.players.find(p => p.id === this.playerId);
        
        if (myPlayer) {
          document.getElementById('scoreDisplay').textContent = myPlayer.score;
          document.getElementById('livesDisplay').textContent = myPlayer.lives;
        }

        document.getElementById('enemiesDisplay').textContent = 
          `${this.gameState.enemies.length}/${this.gameState.enemiesToSpawn - this.gameState.enemiesSpawned + this.gameState.enemies.length}`;

        const playersList = document.getElementById('gamePlayersList');
        let html = '';
        
        this.gameState.players.forEach(player => {
          const isMe = player.id === this.playerId;
          const isDead = player.lives <= 0 && player.health <= 0;
          
          html += `
            <div class="player-item" style="opacity: ${isDead ? '0.5' : '1'}">
              <div class="player-name">
                ${this.escapeHtml(player.name)}
                ${isMe ? ' (我)' : ''}
              </div>
              <div>
                <span style="color: #FFD700;">${player.score}分</span> | 
                <span style="color: ${player.lives > 0 ? '#4CAF50' : '#F44336'};">${player.lives}生命</span>
              </div>
            </div>
          `;
        });
        playersList.innerHTML = html;
      },

      showMenuScreen() {
        this.state = GameState.MENU;
        document.getElementById('menuScreen').classList.remove('hidden');
        document.getElementById('roomScreen').classList.add('hidden');
        document.getElementById('gamePanel').classList.add('hidden');
        document.getElementById('gameCanvas').classList.add('hidden');
        this.isReady = false;
        this.roomId = null;
        this.playerId = null;
      },

      showRoomScreen() {
        this.state = GameState.ROOM;
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('roomScreen').classList.remove('hidden');
        document.getElementById('gamePanel').classList.add('hidden');
        document.getElementById('gameCanvas').classList.add('hidden');
      },

      showGameScreen() {
        this.state = GameState.PLAYING;
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('roomScreen').classList.add('hidden');
        document.getElementById('gamePanel').classList.remove('hidden');
        document.getElementById('gameCanvas').classList.remove('hidden');
      },

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    };

    window.addEventListener('load', () => {
      TankBattle.init();
    });
  </script>
</body>
</html>
